<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>UAF GPA Pro | Orange Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #fff5e6 0%, #ffe6d5 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 40px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.2);
            padding: 32px 28px;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 140, 0, 0.2);
        }
        .header { text-align: center; margin-bottom: 32px; }
        .header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e65c00, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .header p { color: #b45f2b; margin-top: 8px; }

        /* Style for Quick Calc and Total Subjects */
        .input-box-styled {
            background: #fff0e0;
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #ffd9b3;
        }
        .input-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 10px;
        }
        .input-row label { font-weight: 700; color: #cc7000; font-size: 1rem; }
        .input-row input {
            background: white;
            border: 2px solid #ffb366;
            border-radius: 50px;
            padding: 10px 15px;
            width: 140px;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            outline: none;
            color: #cc7000;
        }
        
        .section-title {
            font-size: 0.9rem;
            font-weight: 800;
            color: #ff8c00;
            text-transform: uppercase;
            margin-bottom: 15px;
            display: block;
            text-align: center;
        }

        /* Tables & Rows */
        .courses-header {
            display: grid;
            grid-template-columns: 1fr 1fr 0.3fr;
            gap: 12px;
            background: #ffefe0;
            padding: 14px 16px;
            border-radius: 30px;
            margin-bottom: 15px;
            font-weight: 800;
            color: #b45f2b;
        }
        .course-row {
            display: grid;
            grid-template-columns: 1fr 1fr 0.3fr;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
        }
        .course-row input {
            background: #fffaf5;
            border: 1.5px solid #ffd9b3;
            border-radius: 28px;
            padding: 12px 16px;
            font-size: 0.95rem;
            font-weight: 500;
            outline: none;
            color: #4a2a0a;
        }
        .remove-btn {
            background: #ffe0cc; border: none; border-radius: 40px;
            width: 42px; height: 42px; font-weight: bold; color: #cc5500;
            cursor: pointer; font-size: 1.2rem;
        }

        .btn-calc {
            background: #ff8c00; border: none; border-radius: 60px;
            padding: 14px 28px; font-weight: 800; color: white;
            cursor: pointer; width: 100%; font-size: 1.1rem;
            box-shadow: 0 5px 12px rgba(255, 140, 0, 0.3); margin-top: 10px;
        }
        .btn-add {
            background: transparent; border: 2px solid #ff8c00;
            border-radius: 60px; padding: 12px 20px; font-weight: 700;
            color: #ff8c00; cursor: pointer; margin-bottom: 20px;
        }

        .result-area {
            background: linear-gradient(135deg, #fff0e0, #ffe0cc);
            border-radius: 32px; padding: 24px; text-align: center; margin-top: 20px;
        }
        .cgpa-number { font-size: 64px; font-weight: 800; color: #ff8c00; }

        /* Payment */
        .payment-card {
            background: white; border-radius: 40px; padding: 24px; text-align: center;
            border: 1px solid #ffd9b3;
        }
        .payment-number {
            background: #fff0e0; border-radius: 60px; padding: 10px 20px;
            display: inline-flex; align-items: center; gap: 10px; margin: 10px 0;
            font-weight: 800; color: #cc5500;
        }
        .whatsapp-btn {
            background: #25D366; border: none; border-radius: 60px;
            padding: 12px 28px; font-weight: 700; color: white; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header">
            <h1>📊 UAF GPA PRO</h1>
            <p>Calculate Semester GPA or Lifetime CGPA</p>
        </div>

        <div class="input-box-styled">
            <span class="section-title">⚡ Quick Lifetime CGPA</span>
            <div class="input-row">
                <label>Total Quality Points:</label>
                <input type="number" id="simpleQP" placeholder="e.g. 54.5">
            </div>
            <div class="input-row">
                <label>Total Credit Hours:</label>
                <input type="number" id="simpleCH" placeholder="e.g. 18">
            </div>
            <button class="btn-calc" onclick="calculateSimple()">Calculate Simple CGPA</button>
        </div>

        <hr style="border: 0; border-top: 1px dashed #ffb366; margin: 30px 0;">

        <span class="section-title">📚 Semester Wise Calculation</span>
        <div class="input-row" style="justify-content: center; margin-bottom: 20px;">
            <label>No. of Subjects:</label>
            <input type="number" id="totalSubjectsInput" value="4" style="width: 80px;">
            <button onclick="generateRows()" style="background:#ff8c00; color:white; border:none; padding:10px 15px; border-radius:20px; cursor:pointer;">Set</button>
        </div>

        <div class="courses-header">
            <span>📖 Credits</span>
            <span>📊 Marks</span>
            <span>🗑️</span>
        </div>

        <div id="courseList"></div>
        <button class="btn-add" onclick="addSingleRow()">+ Add Subject</button>
        <button class="btn-calc" onclick="computeAndDisplay()">✨ Calculate Semester GPA ✨</button>

        <div class="result-area">
            <div style="font-weight: 600;">FINAL RESULT</div>
            <div class="cgpa-number" id="cgpaDisplay">0.00</div>
            <div id="creditDisplay" style="color:#b45f2b; font-weight:600;">📌 Total Credit Hours: 0</div>
        </div>
    </div>

    <div class="payment-card">
        <h3 style="color:#cc5500;">📑 Need Sociology PPTs?</h3>
        <p>Ready-made Slides — Rs.30/slide</p>
        <div class="payment-number">
            <span>💸 03496700536</span>
        </div><br>
        <button class="whatsapp-btn" onclick="orderWA()">📲 Order via WhatsApp</button>
    </div>
</div>

<script>
    const paymentNum = "03496700536";

    function getUAFPoint(m) {
        if (m >= 80) return 4.0;
        if (m >= 65) return 3.0 + (m - 65) * (1.0 / 15.0);
        if (m >= 50) return 2.0 + (m - 50) * (1.0 / 15.0);
        if (m >= 40) return 1.0 + (m - 40) * (1.0 / 10.0);
        return 0.0;
    }

    function calculateSimple() {
        const qp = parseFloat(document.getElementById('simpleQP').value);
        const ch = parseFloat(document.getElementById('simpleCH').value);
        if (qp > 0 && ch > 0) {
            const res = (qp / ch).toFixed(2);
            document.getElementById('cgpaDisplay').innerText = res;
            document.getElementById('creditDisplay').innerText = `📌 Lifetime Total Credits: ${ch}`;
        } else {
            alert("Please enter valid Total Points and Hours");
        }
    }

    function createSubjectRow(c='', m='') {
        const div = document.createElement('div');
        div.className = 'course-row';
        div.innerHTML = `
            <input type="number" class="credit-input" placeholder="Cr" value="${c}">
            <input type="number" class="marks-input" placeholder="Marks" value="${m}">
            <button class="remove-btn" onclick="this.parentElement.remove()">✖</button>
        `;
        return div;
    }

    function generateRows() {
        const val = document.getElementById('totalSubjectsInput').value;
        const list = document.getElementById('courseList');
        list.innerHTML = '';
        for(let i=0; i<val; i++) list.appendChild(createSubjectRow());
    }

    function addSingleRow() {
        document.getElementById('courseList').appendChild(createSubjectRow());
    }

    function computeAndDisplay() {
        let tp = 0, tc = 0;
        document.querySelectorAll('.course-row').forEach(row => {
            const c = parseFloat(row.querySelector('.credit-input').value);
            const m = parseFloat(row.querySelector('.marks-input').value);
            if(c > 0 && !isNaN(m)) {
                tp += getUAFPoint(m) * c;
                tc += c;
            }
        });
        const res = tc > 0 ? (tp / tc).toFixed(2) : "0.00";
        document.getElementById('cgpaDisplay').innerText = res;
        document.getElementById('creditDisplay').innerText = `📌 Semester Credits: ${tc}`;
    }

    function orderWA() {
        const msg = encodeURIComponent("Hi! I need Sociology PPT slides. I saw your GPA tool.");
        window.open(`https://wa.me/${paymentNum}?text=${msg}`, '_blank');
    }

    // Init
    generateRows();
</script>
</body>
</html>
