<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Theft Auto - UAF GPA Tool</title>
    <style>
        body { 
            font-family: 'Arial Black', Gadget, sans-serif; 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-attachment: fixed;
            color: white; 
            text-align: center; 
            padding: 20px; 
        }
        .calc-box { 
            background: rgba(0, 0, 0, 0.85); 
            padding: 40px; 
            border: 4px solid #fdbb2d; 
            border-radius: 0px; 
            display: inline-block; 
            box-shadow: 10px 10px 0px #000;
            max-width: 400px;
            margin-top: 50px;
        }
        h1 { color: #fdbb2d; font-size: 3rem; margin-bottom: 5px; text-shadow: 3px 3px #000; }
        h3 { letter-spacing: 5px; margin-bottom: 30px; font-size: 0.9rem; }
        input { 
            margin: 10px 0; 
            padding: 15px; 
            width: 90%; 
            background: #222; 
            border: 1px solid #444; 
            color: #fdbb2d; 
            font-weight: bold;
        }
        button { 
            background: #fdbb2d; 
            color: black; 
            padding: 15px 30px; 
            border: none; 
            cursor: pointer; 
            font-weight: 900; 
            width: 100%; 
            margin-top: 10px;
            text-transform: uppercase;
        }
        button:hover { background: #fff; }
        #result { 
            margin-top: 30px; 
            font-size: 2rem; 
            font-weight: bold; 
        }
        .footer {
            margin-top: 50px;
            background: rgba(0,0,0,0.9);
            padding: 20px;
            font-size: 0.8rem;
            border-top: 2px solid #fdbb2d;
        }
        .footer a { color: #fdbb2d; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="calc-box">
        <h1>GTA</h1>
        <h3>UAF GPA CALCULATOR</h3>
        
        <div id="calculator">
            <input type="number" id="qualityPoints" placeholder="TOTAL QUALITY POINTS">
            <br>
            <input type="number" id="creditHours" placeholder="TOTAL CREDIT HOURS">
            <br>
            <button onclick="calculateGPA()">START CALCULATION</button>
            
            <div id="result">---</div>
        </div>
    </div>

    <div class="footer">
        <p>DEVELOPED BY: <strong>MUHAMMAD AMIR</strong></p>
        <p>CONTACT: <a href="mailto:muhammedamirranjha@gmail.com">muhammedamirranjha@gmail.com</a></p>
        <p>UAF SOCIOLOGY DEPARTMENT | 2026</p>
    </div>

    <script>
        function calculateGPA() {
            const qp = parseFloat(document.getElementById('qualityPoints').value);
            const ch = parseFloat(document.getElementById('creditHours').value);

            if (isNaN(qp) || isNaN(ch) || ch <= 0) {
                alert("Enter valid numbers, Amir!");
                return;
            }

            const gpa = (qp / ch).toFixed(2);
            let message = "";
            let color = "";

            if (gpa >= 3.5) {
                message = "MISSION PASSED!<br><span style='font-size: 1.2rem'>RESPECT +</span>";
                color = "#5cb85c"; // Green
            } else if (gpa >= 2.0) {
                message = "PASSED<br><span style='font-size: 1.2rem'>HUSTLE CONTINUES</span>";
                color = "#fdbb2d"; // Gold
            } else {
                message = "WASTED<br><span style='font-size: 1.2rem'>PROBATION HIT</span>";
                color = "#b21f1f"; // Red
            }

            const resultDiv = document.getElementById('result');
            resultDiv.style.color = color;
            resultDiv.innerHTML = "GPA: " + gpa + "<br>" + message;
        }
    </script>
</body>
</html>
