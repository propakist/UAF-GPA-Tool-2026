<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>UAF GPA Pro | Flexible Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(145deg, #fff5e6 0%, #ffe6d5 100%); min-height: 100vh; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; }
        
        .card { background: white; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); padding: 25px; margin-bottom: 25px; border: 1px solid rgba(255, 140, 0, 0.2); }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #e65c00, #ff8c00); -webkit-background-clip: text; background-clip: text; color: transparent; }

        /* Setup Section */
        .setup-box { background: #fff0e0; padding: 20px; border-radius: 20px; display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .setup-box label { font-weight: 700; color: #cc7000; }
        .setup-box input { padding: 10px; width: 80px; border-radius: 10px; border: 2px solid #ffb366; text-align: center; font-weight: bold; }
        .btn-set { background: #ff8c00; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* Table Grid */
        .table-header { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr 0.4fr; gap: 10px; background: #ffefe0; padding: 15px; border-radius: 15px; font-weight: 800; color: #b45f2b; font-size: 0.8rem; text-align: center; margin-bottom: 10px; }
        .course-row { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr 0.4fr; gap: 10px; margin-bottom: 10px; align-items: center; }
        .course-row input { padding: 12px; border: 1px solid #ffd9b3; border-radius: 12px; width: 100%; text-align: center; font-size: 0.9rem; outline: none; }
        .course-row input:focus { border-color: #ff8c00; background: #fffaf5; }
        
        .remove-btn { background: #ffe0cc; border: none; border-radius: 50%; width: 30px; height: 30px; color: #cc5500; cursor: pointer; font-weight: bold; }

        /* Calculation Buttons */
        .btn-add { background: white; border: 2px solid #ff8c00; color: #ff8c00; padding: 10px 20px; border-radius: 15px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .btn-main { background: #ff8c00; color: white; border: none; padding: 18px; border-radius: 15px; cursor: pointer; width: 100%; font-size: 1.1rem; font-weight: 800; box-shadow: 0 5px 15px rgba(255, 126, 0, 0.3); }

        /* Dual Result Display */
        .result-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
        .result-box { background: linear-gradient(135deg, #fff0e0, #ffe0cc); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #ffd9b3; }
        .res-label { font-size: 0.7rem; font-weight: 800; color: #b45f2b; text-transform: uppercase; }
        .res-value { font-size: 2.5rem; font-weight: 800; color: #ff8c00; margin: 5px 0; }
        
        .footer-card { background: white; border-radius: 30px; padding: 25px; text-align: center; border: 1px solid #ffd9b3; }
        .whatsapp-btn { background: #25D366; color: white; padding: 12px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 15px; }

        @media (max-width: 600px) {
            .table-header, .course-row { grid-template-columns: 1fr 1fr 1fr 0.5fr; }
            .course-name { display: none; } /* Hide subject name on small phones */
            .result-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header">
            <h1>📊 UAF GPA PRO</h1>
            <p>Custom Subject Limits & Flexible Marks</p>
        </div>

        <div class="setup-box">
            <label>How many subjects?</label>
            <input type="number" id="subjectCount" value="6">
            <button class="btn-set" onclick="generateRows()">Set Rows</button>
        </div>

        <div class="table-header">
            <span class="course-name">Subject Name</span>
            <span>Credit Hr</span>
            <span>Obtained</span>
            <span>Total</span>
            <span></span>
        </div>

        <div id="courseList"></div>

        <button class="btn-add" onclick="addRow()">+ Add Extra Subject</button>
        <button class="btn-main" onclick="calculateAll()">🚀 CALCULATE RESULTS</button>

        <div class="result-container">
            <div class="result-box">
                <div class="res-label">Semester GPA</div>
                <div class="res-value" id="gpaDisplay">0.00</div>
                <div style="font-size: 0.8rem;" id="semCredits">Credits: 0</div>
            </div>
            <div class="result-box">
                <div class="res-label">Estimated CGPA</div>
                <div class="res-value" id="cgpaDisplay">0.00</div>
                <div style="font-size: 0.8rem;" id="totalPoints">Points: 0</div>
            </div>
        </div>
    </div>

    <div class="footer-card">
        <h3 style="color:#cc5500;">📑 Need Professional Slides?</h3>
        <p>PPTs for All Departments — Rs.30/slide</p>
        <p style="font-weight: bold; margin-top: 10px;">Payment Number: 03496700536</p>
        <a href="https://wa.me/923496700536" class="whatsapp-btn">📲 WhatsApp Order</a>
    </div>
</div>

<script>
    // UAF Conversion Formula
    function getGP(obtained, total) {
        let per = (obtained / total) * 100;
        if (per >= 80) return 4.0;
        if (per >= 65) return 3.0 + (per - 65) * (1.0 / 15.0);
        if (per >= 50) return 2.0 + (per - 50) * (1.0 / 15.0);
        if (per >= 40) return 1.0 + (per - 40) * (1.0 / 10.0);
        return 0.0;
    }

    function createRow() {
        const div = document.createElement('div');
        div.className = 'course-row';
        div.innerHTML = `
            <input type="text" class="course-name" placeholder="Subject">
            <input type="number" class="cred" placeholder="Cr">
            <input type="number" class="obt" placeholder="Get">
            <input type="number" class="tot" placeholder="Total" value="100">
            <button class="remove-btn" onclick="this.parentElement.remove()">✖</button>
        `;
        return div;
    }

    function generateRows() {
        const count = document.getElementById('subjectCount').value;
        const list = document.getElementById('courseList');
        list.innerHTML = '';
        for(let i=0; i<count; i++) { list.appendChild(createRow()); }
    }

    function addRow() {
        document.getElementById('courseList').appendChild(createRow());
    }

    function calculateAll() {
        let totalQualityPoints = 0;
        let totalCreditHours = 0;

        document.querySelectorAll('.course-row').forEach(row => {
            const c = parseFloat(row.querySelector('.cred').value);
            const o = parseFloat(row.querySelector('.obt').value);
            const t = parseFloat(row.querySelector('.tot').value);

            if (c > 0 && t > 0 && !isNaN(o)) {
                let gp = getGP(o, t);
                totalQualityPoints += (gp * c);
                totalCreditHours += c;
            }
        });

        const result = totalCreditHours > 0 ? (totalQualityPoints / totalCreditHours).toFixed(2) : "0.00";
        
        // Update Displays
        document.getElementById('gpaDisplay').innerText = result;
        document.getElementById('cgpaDisplay').innerText = result; // For a single semester, GPA = CGPA
        document.getElementById('semCredits').innerText = `Credits: ${totalCreditHours}`;
        document.getElementById('totalPoints').innerText = `Points: ${totalQualityPoints.toFixed(2)}`;
    }

    // Initialize with 6 rows
    generateRows();
</script>

</body>
</html>
