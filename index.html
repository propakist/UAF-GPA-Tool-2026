<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>UAF GPA PRO | Universal Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fff5e6; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: white; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); padding: 25px; margin-bottom: 25px; border: 1px solid #ffd9b3; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 2.2rem; font-weight: 800; color: #ff8c00; }
        .header p { color: #b45f2b; font-weight: 600; }

        /* Rows Setup */
        .setup-box { background: #fff0e0; padding: 20px; border-radius: 20px; display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .setup-box input { padding: 10px; width: 80px; border-radius: 10px; border: 2px solid #ffb366; text-align: center; font-weight: bold; font-size: 1.1rem; }
        .btn-set { background: #ff8c00; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: 800; text-transform: uppercase; }

        /* Grid for Inputs */
        .table-header { display: grid; grid-template-columns: 1fr 1fr 1fr 0.3fr; gap: 10px; background: #ffefe0; padding: 15px; border-radius: 15px; font-weight: 800; color: #b45f2b; font-size: 0.85rem; text-align: center; margin-bottom: 10px; }
        .course-row { display: grid; grid-template-columns: 1fr 1fr 1fr 0.3fr; gap: 10px; margin-bottom: 10px; align-items: center; }
        .course-row input { padding: 14px; border: 1px solid #ffd9b3; border-radius: 12px; width: 100%; text-align: center; font-size: 1rem; outline: none; background: #fffaf5; }
        .course-row input:focus { border-color: #ff8c00; background: white; }
        .remove-btn { background: #ffe0cc; border: none; border-radius: 50%; width: 35px; height: 35px; color: #cc5500; cursor: pointer; font-weight: bold; font-size: 1.2rem; }

        .btn-main { background: #ff8c00; color: white; border: none; padding: 20px; border-radius: 15px; cursor: pointer; width: 100%; font-size: 1.2rem; font-weight: 800; margin-top: 10px; box-shadow: 0 5px 15px rgba(255, 140, 0, 0.3); }

        /* Results Display */
        .result-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
        .result-box { background: #fff0e0; padding: 25px; border-radius: 25px; text-align: center; border: 1px solid #ffd9b3; }
        .res-label { font-size: 0.8rem; font-weight: 800; color: #b45f2b; text-transform: uppercase; margin-bottom: 5px; }
        .res-value { font-size: 2.8rem; font-weight: 800; color: #ff8c00; }

        .footer-card { background: white; border-radius: 30px; padding: 30px; text-align: center; border: 1px solid #ffd9b3; }
        .whatsapp-btn { background: #25D366; color: white; padding: 15px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 15px; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header">
            <h1>📊 UAF GPA PRO</h1>
            <p>Universal Calculator for All Departments</p>
        </div>

        <div class="setup-box">
            <label>No. of Subjects:</label>
            <input type="number" id="subjectCount" value="7">
            <button class="btn-set" onclick="generateRows()">Update List</button>
        </div>

        <div class="table-header">
            <span>Credit Score</span>
            <span>Marks Obtained</span>
            <span>Total Marks</span>
            <span></span>
        </div>

        <div id="courseList"></div>

        <button class="btn-main" onclick="calculateAll()">🚀 CALCULATE RESULTS</button>

        <div class="result-container">
            <div class="result-box">
                <div class="res-label">Semester GPA</div>
                <div class="res-value" id="gpaDisplay">0.00</div>
                <div style="font-size: 0.9rem; font-weight: 600;" id="semCredits">Total Credits: 0</div>
            </div>
            <div class="result-box">
                <div class="res-label">Quality Points</div>
                <div class="res-value" id="qpDisplay">0.0</div>
                <div style="font-size: 0.9rem; font-weight: 600;">For Cumulative CGPA</div>
            </div>
        </div>
    </div>

    <div class="footer-card">
        <h3 style="color:#cc5500;">📑 Professional Slide Service</h3>
        <p>Ready-made PPTs for <strong>All Departments</strong> — Rs.30/slide</p>
        <p style="font-weight: bold; margin-top: 10px; font-size: 1.1rem;">Easypaisa: 03496700536</p>
        <a href="https://wa.me/923496700536" class="whatsapp-btn">📲 Order via WhatsApp</a>
    </div>
</div>

<script>
    // Official UAF GPA Scale
    function getGP(obtained, total) {
        let per = (obtained / total) * 100;
        if (per >= 80) return 4.0;
        if (per >= 65) return 3.0 + (per - 65) * (1.0 / 15.0);
        if (per >= 50) return 2.0 + (per - 50) * (1.0 / 15.0);
        if (per >= 40) return 1.0 + (per - 40) * (1.0 / 10.0);
        return 0.0;
    }

    function createRow() {
        const div = document.createElement('div');
        div.className = 'course-row';
        div.innerHTML = `
            <input type="number" class="cred" placeholder="Credits">
            <input type="number" class="obt" placeholder="Obtained">
            <input type="number" class="tot" placeholder="Total" value="100">
            <button class="remove-btn" onclick="this.parentElement.remove()">✖</button>
        `;
        return div;
    }

    function generateRows() {
        const count = document.getElementById('subjectCount').value;
        const list = document.getElementById('courseList');
        list.innerHTML = '';
        const limit = count > 25 ? 25 : count; // Limit to 25 subjects for stability
        for(let i=0; i < limit; i++) { list.appendChild(createRow()); }
    }

    function calculateAll() {
        let totalQP = 0;
        let totalCH = 0;

        document.querySelectorAll('.course-row').forEach(row => {
            const c = parseFloat(row.querySelector('.cred').value);
            const o = parseFloat(row.querySelector('.obt').value);
            const t = parseFloat(row.querySelector('.tot').value);

            if (c > 0 && t > 0 && !isNaN(o)) {
                totalQP += (getGP(o, t) * c);
                totalCH += c;
            }
        });

        const finalGPA = totalCH > 0 ? (totalQP / totalCH).toFixed(2) : "0.00";
        document.getElementById('gpaDisplay').innerText = finalGPA;
        document.getElementById('qpDisplay').innerText = totalQP.toFixed(1);
        document.getElementById('semCredits').innerText = `Total Credits: ${totalCH}`;
    }

    // Initialize with 7 subjects as default
    generateRows();
</script>

</body>
</html>
